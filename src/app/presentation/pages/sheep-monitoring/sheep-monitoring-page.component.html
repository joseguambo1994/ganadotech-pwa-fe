<div class="counter-shell">
  <header class="intro-card">
    <div class="brand-row">
      <img src="/ganadotech.png" alt="GanadoTech mark" class="brand-mark" />
      <div>
        <p class="eyebrow">GanadoTech SPA</p>
        <h1>{{ snapshot().title }}</h1>
      </div>
    </div>
  </header>

  <main class="counter-content">
    <section class="video-card">
      <div class="section-head">
        <h2>Vista del corral</h2>
        <span>{{ snapshot().lastUpdatedLabel }}</span>
      </div>

      <video
        #monitoringVideo
        class="monitoring-video"
        [poster]="posterSource"
        [src]="videoSource"
        autoplay
        muted
        loop
        playsinline
        controls
        (loadedmetadata)="handleMetadata(monitoringVideo)"
        (timeupdate)="handleTimeUpdate(monitoringVideo)"
      ></video>
    </section>

    <section class="counter-card">
      <div class="section-head">
        <h2>Contadores</h2>
        <span>Solo cinco indicadores</span>
      </div>

      <div class="counter-list">
        @for (counter of snapshot().counters; track trackCounter($index, counter)) {
          <article class="counter-row" [attr.data-tone]="counter.tone">
            <div class="counter-label-group">
              <span class="counter-badge">{{ counter.label.slice(0, 1) }}</span>
              <span class="counter-label">{{ counter.label }}</span>
            </div>
            <strong class="counter-value">x{{ counter.value }}</strong>
          </article>
        }
      </div>
    </section>
  </main>
</div>
